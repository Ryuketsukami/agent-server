name: Vast.ai — Start instance

on:
  schedule:
    # 06:30 AM Israel time (GMT+2), Sunday through Thursday
    - cron: "30 4 * * 0-4"
  workflow_dispatch:  # allow manual start from GitHub UI

jobs:
  start:
    name: Start Vast.ai GPU instance
    runs-on: ubuntu-latest
    steps:
      - name: Install vastai CLI
        run: pip install vastai --quiet

      - name: Start instance
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          VAST_INSTANCE_ID: ${{ secrets.VAST_INSTANCE_ID }}
        run: |
          vastai set api-key "$VAST_API_KEY"
          vastai start instance "$VAST_INSTANCE_ID"
          echo "Instance $VAST_INSTANCE_ID started."
