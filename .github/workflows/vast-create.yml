name: Vast.ai — Create instance

on:
  schedule:
    # 06:20 AM Israel time (GMT+2), Sunday through Thursday (10 min early to warm up)
    - cron: "20 4 * * 0-4"
  workflow_dispatch:

permissions:
  actions: write  # needed to update the VAST_INSTANCE_ID repo variable

jobs:
  create:
    name: Create Vast.ai GPU instance
    runs-on: ubuntu-latest
    steps:
      - name: Install vastai CLI
        run: pip install vastai --quiet

      - name: Find cheapest offer and create instance
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          EXISTING_INSTANCE_ID: ${{ vars.VAST_INSTANCE_ID }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          vastai set api-key "$VAST_API_KEY"

          # ── Guard: skip if an instance is already running ──────────────────
          if [ -n "$EXISTING_INSTANCE_ID" ]; then
            echo "VAST_INSTANCE_ID is set ($EXISTING_INSTANCE_ID) — checking if it's still alive..."
            STATUS=$(vastai show instance "$EXISTING_INSTANCE_ID" --raw 2>/dev/null | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('actual_status','unknown'))" 2>/dev/null || echo "gone")

            if [ "$STATUS" != "gone" ] && [ "$STATUS" != "unknown" ]; then
              echo "Instance $EXISTING_INSTANCE_ID is already up (status: $STATUS). Nothing to do."
              exit 0
            fi
            echo "Instance $EXISTING_INSTANCE_ID is gone (status: $STATUS). Creating a fresh one."
          fi

          # ── Search for cheapest offer with required specs ───────────────────
          echo "Searching for cheapest offer (min 40GB VRAM, verified, reliable)..."
          SEARCH_RESULT=$(vastai search offers \
            'verified=true reliability>0.90 inet_down>100 num_gpus=1 gpu_ram>=40' \
            --order 'dph_total asc' --limit 5 --raw)

          OFFER_ID=$(echo "$SEARCH_RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          offers = data.get('offers', [])
          if not offers:
              print('ERROR: no offers found matching criteria', file=sys.stderr)
              sys.exit(1)
          print(offers[0]['id'])
          ")

          echo "Cheapest offer ID: $OFFER_ID"
          echo "$SEARCH_RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          o = data['offers'][0]
          print(f\"  GPU: {o.get('gpu_name','?')}  VRAM: {o.get('gpu_ram','?')}GB  Cost: \${o.get('dph_total',0):.4f}/hr\")
          " 2>/dev/null || true

          # ── Create instance ─────────────────────────────────────────────────
          echo "Creating instance on offer $OFFER_ID..."
          CREATE_RESULT=$(vastai create instance "$OFFER_ID" \
            --image vastai/pytorch:@vastai-automatic-tag \
            --env "-p 8123:8123 \
                   -e OPEN_BUTTON_PORT=8123 \
                   -e OPEN_BUTTON_TOKEN=1 \
                   -e MODEL_NAME=qwen3:8b \
                   -e LANGCHAIN_TRACING_V2=true \
                   -e LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY} \
                   -e TAVILY_API_KEY=${TAVILY_API_KEY}" \
            --onstart-cmd 'curl -fsSL https://raw.githubusercontent.com/Ryuketsukami/agent-server/main/startup.sh | bash' \
            --disk 40 \
            --ssh \
            --direct \
            --raw)

          INSTANCE_ID=$(echo "$CREATE_RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if not d.get('success'):
              print('ERROR: create failed:', d, file=sys.stderr)
              sys.exit(1)
          print(d['new_contract'])
          ")

          echo "Created instance ID: $INSTANCE_ID"

          # ── Store new instance ID in GitHub Actions repo variable ───────────
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPO/actions/variables/VAST_INSTANCE_ID" \
            -d "{\"name\":\"VAST_INSTANCE_ID\",\"value\":\"$INSTANCE_ID\"}")

          if [ "$HTTP_CODE" = "404" ]; then
            curl -s -f \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GH_REPO/actions/variables" \
              -d "{\"name\":\"VAST_INSTANCE_ID\",\"value\":\"$INSTANCE_ID\"}"
            echo "Variable VAST_INSTANCE_ID created."
          elif [ "$HTTP_CODE" = "204" ]; then
            echo "Variable VAST_INSTANCE_ID updated."
          else
            echo "WARNING: unexpected HTTP $HTTP_CODE when storing instance ID."
          fi

          echo "Done. Instance $INSTANCE_ID is spinning up."
